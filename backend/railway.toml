[build]
builder = "NIXPACKS"
buildCommand = "npx prisma generate --schema src/prisma/schema.prisma && npm run build"

[deploy]
startCommand = "npm start"
releaseCommand = "npx prisma migrate deploy --schema src/prisma/schema.prisma"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
