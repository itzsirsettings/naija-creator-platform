services:
  postgres:
    image: postgres:16-alpine
    container_name: tehilla-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tehilla
      POSTGRES_USER: tehilla
      POSTGRES_PASSWORD: password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - tehilla_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tehilla -d tehilla"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: tehilla-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - tehilla_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  tehilla_postgres_data:
  tehilla_redis_data:
